<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Nano 在線對話</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background-color: #e2e8f0;
            border-radius: 10px;
        }
        @keyframes dot-flashing {
            0% { opacity: 1; }
            50%, 100% { opacity: 0.2; }
        }
        .dot {
            animation: dot-flashing 1s infinite linear alternate;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans text-slate-800">

    <!-- Header -->
    <header class="p-4 bg-white shadow-sm border-b flex justify-between items-center px-6">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-robot text-white text-sm"></i>
            </div>
            <h1 class="font-bold text-xl tracking-tight text-slate-700">Gemini Nano 助手</h1>
        </div>
        <div id="status-badge" class="px-3 py-1 rounded-full text-xs font-medium flex items-center gap-2 bg-slate-100 text-slate-500">
            <span class="w-2 h-2 rounded-full bg-slate-400"></span>
            正在檢查模型狀態...
        </div>
    </header>

    <!-- Main Chat Area -->
    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 max-w-4xl mx-auto w-full chat-container">
        <!-- Welcome Message -->
        <div class="flex justify-start">
            <div class="max-w-[80%] bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-slate-100">
                <p class="text-sm leading-relaxed">
                    你好！我是運行在你瀏覽器本地的 **Gemini Nano**。你可以問我關於任何問題，我會直接在你的裝置上處理，保護你的隱私。
                </p>
                <div class="mt-2 text-[10px] text-slate-400">系統消息</div>
            </div>
        </div>
    </main>

    <!-- Typing Indicator (Hidden by default) -->
    <div id="typing-indicator" class="hidden px-6 py-2 max-w-4xl mx-auto w-full">
        <div class="bg-white px-4 py-2 rounded-xl border border-slate-100 shadow-sm inline-flex items-center gap-1">
            <span class="text-xs text-slate-500 mr-1">AI 正在思考</span>
            <span class="w-1.5 h-1.5 bg-blue-400 rounded-full dot"></span>
            <span class="w-1.5 h-1.5 bg-blue-400 rounded-full dot"></span>
            <span class="w-1.5 h-1.5 bg-blue-400 rounded-full dot"></span>
        </div>
    </div>

    <!-- Input Area -->
    <footer class="p-4 bg-white border-t">
        <div class="max-w-4xl mx-auto flex items-end gap-2 bg-slate-50 p-2 rounded-2xl border focus-within:border-blue-400 transition-all">
            <textarea id="user-input" 
                rows="1" 
                placeholder="輸入你的問題..." 
                class="flex-1 bg-transparent border-none focus:ring-0 px-3 py-2 resize-none max-h-32 text-sm"
                oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
            <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white w-10 h-10 rounded-xl flex items-center justify-center transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        <p class="text-center text-[10px] text-slate-400 mt-2">
            提示：此功能需要支援 Chrome Built-in AI 的瀏覽器版本
        </p>
    </footer>

    <!-- Custom Modal for Errors -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full shadow-2xl">
            <h3 class="text-lg font-bold text-red-600 mb-2">提示訊息</h3>
            <p id="modal-msg" class="text-sm text-slate-600 mb-4 whitespace-pre-line"></p>
            <button onclick="closeModal()" class="w-full bg-slate-800 text-white py-2 rounded-xl font-medium">關閉</button>
        </div>
    </div>

    <script>
        let aiSession = null;
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusBadge = document.getElementById('status-badge');
        const typingIndicator = document.getElementById('typing-indicator');

        // 1. 初始化檢查與建立 Session
        async function initAI() {
            try {
                // 檢查 API 是否存在 (優先使用全域的 LanguageModel)
                let modelAPI = null;
                if (typeof LanguageModel !== 'undefined') {
                    modelAPI = LanguageModel;
                } else if (window.ai && window.ai.languageModel) {
                    modelAPI = window.ai.languageModel;
                }
                
                if (!modelAPI) {
                    updateStatus('不支持', 'bg-red-100 text-red-600', 'bg-red-500');
                    showError("您的瀏覽器目前不支援 Window AI API。\n請確保使用最新版 Chrome 並開啟相關 Flags。");
                    return;
                }

                // 相容不同版本的 API (availability 或 capabilities)
                let isAvailable = "readily";
                if (typeof modelAPI.availability === 'function') {
                    const availability = await modelAPI.availability({ languages: ["zh-Hant"] });
                    if (availability === "no") isAvailable = "no";
                } else if (typeof modelAPI.capabilities === 'function') {
                    const capabilities = await modelAPI.capabilities();
                    if (capabilities.available === "no") isAvailable = "no";
                }
                
                if (isAvailable === "no") {
                    updateStatus('不可用', 'bg-red-100 text-red-600', 'bg-red-500');
                    showError("模型不可用。可能需要手動下載組件。");
                    return;
                }

                updateStatus('準備就緒', 'bg-green-100 text-green-600', 'bg-green-500');
                
                // 建立會話，並加入 systemPrompt 讓它預設使用繁體中文回答
                aiSession = await modelAPI.create({
                    systemPrompt: "你是一個有用的 AI 助手，請一律使用繁體中文 (Traditional Chinese) 回答使用者的所有問題。"
                });
            } catch (e) {
                console.error("初始化失敗:", e);
                updateStatus('初始化失敗', 'bg-red-100 text-red-600', 'bg-red-500');
                showError("初始化失敗：" + e.message + "\n\n💡 注意：目前您在「預覽視窗 (Iframe)」中執行。基於安全限制，Chrome 瀏覽器會阻擋 Iframe 調用本地端 AI API。\n\n👉 解決方法：請將這份程式碼存成 .html 檔案後，直接在 Chrome 瀏覽器中打開！");
            }
        }

        function updateStatus(text, wrapperClass, dotClass) {
            statusBadge.className = `px-3 py-1 rounded-full text-xs font-medium flex items-center gap-2 ${wrapperClass}`;
            statusBadge.innerHTML = `<span class="w-2 h-2 rounded-full ${dotClass}"></span>${text}`;
        }

        // 2. 傳送訊息邏輯
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || !aiSession) return;

            // 清空輸入並加入使用者氣泡
            addMessage(text, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';
            
            // 顯示思考中
            typingIndicator.classList.remove('hidden');
            chatBox.scrollTop = chatBox.scrollHeight;
            sendBtn.disabled = true;

            try {
                const startTime = performance.now(); // 記錄開始時間
                // 呼叫 Gemini Nano API (如同你圖片中的 session.prompt)
                // 如果你的版本支援串流，可以使用 promptStreaming()
                const result = await aiSession.prompt(text);
                const endTime = performance.now(); // 記錄結束時間
                const timeTaken = ((endTime - startTime) / 1000).toFixed(2); // 計算耗時 (秒)，取小數點後兩位
                
                // 隱藏思考中並加入 AI 氣泡
                typingIndicator.classList.add('hidden');
                addMessage(result, 'ai', timeTaken);
            } catch (e) {
                typingIndicator.classList.add('hidden');
                addMessage("執行失敗：" + e.message, 'error');
            } finally {
                sendBtn.disabled = false;
            }
        }

        function addMessage(text, type, timeTaken = null) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${type === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            
            let bubbleClass = "";
            let meta = "";

            if (type === 'user') {
                bubbleClass = "bg-blue-600 text-white rounded-2xl rounded-tr-none shadow-md";
                meta = "你";
            } else if (type === 'ai') {
                bubbleClass = "bg-white text-slate-800 rounded-2xl rounded-tl-none shadow-sm border border-slate-100";
                meta = "Gemini Nano" + (timeTaken ? ` · ⏱️ ${timeTaken} 秒` : "");
            } else {
                bubbleClass = "bg-red-50 text-red-600 rounded-xl text-sm border border-red-100";
                meta = "系統錯誤";
            }

            // 處理換行
            const formattedText = text.replace(/\n/g, '<br>');

            wrapper.innerHTML = `
                <div class="max-w-[85%] sm:max-w-[75%] p-4 ${bubbleClass}">
                    <div class="text-sm leading-relaxed">${formattedText}</div>
                    <div class="mt-2 text-[10px] ${type === 'user' ? 'text-blue-100' : 'text-slate-400'}">${meta}</div>
                </div>
            `;

            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 3. 事件監聽
        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        function showError(msg) {
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.replace('flex', 'hidden');
        }

        // 啟動
        window.onload = initAI;
    </script>
</body>
</html>
