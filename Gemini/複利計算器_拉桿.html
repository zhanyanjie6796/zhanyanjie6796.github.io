<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>複利計算器</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9f9f7;
      color: #1a1a18;
      padding: 2rem 1.5rem;
      max-width: 720px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 24px;
      margin-bottom: 1.5rem;
    }
    .ctrl-row { display: flex; flex-direction: column; gap: 4px; }
    .ctrl-label {
      font-size: 13px;
      color: #666;
      display: flex;
      justify-content: space-between;
    }
    .ctrl-label span { font-weight: 500; color: #1a1a18; }
    input[type="range"] {
      width: 100%;
      accent-color: #185FA5;
      cursor: pointer;
    }
    input[type="number"] {
      width: 100%;
      padding: 5px 8px;
      font-size: 13px;
      font-family: inherit;
      border: 0.5px solid #ccc;
      border-radius: 6px;
      background: #fff;
      color: #1a1a18;
      outline: none;
    }
    input[type="number"]:focus { border-color: #185FA5; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { opacity: 1; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .metric {
      background: #f1efe8;
      border-radius: 8px;
      padding: 12px 14px;
    }
    .metric-label { font-size: 12px; color: #666; margin-bottom: 4px; }
    .metric-value { font-size: 20px; font-weight: 500; color: #1a1a18; }
    .metric-value.highlight { color: #185FA5; }
    .chart-wrap { position: relative; width: 100%; height: 260px; }
    .legend {
      display: flex;
      gap: 20px;
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }
    .legend span { display: flex; align-items: center; gap: 6px; }
    .swatch { width: 28px; height: 3px; border-radius: 2px; }
    .summary {
      margin-top: 1.5rem;
      padding: 14px 16px;
      background: #f1efe8;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.7;
      color: #444;
    }
    .summary strong { color: #1a1a18; font-weight: 500; }
    @media (max-width: 480px) {
      .controls { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr 1fr; }
      .metrics .metric:last-child { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <h1>複利計算器</h1>

  <div class="controls">
    <div class="ctrl-row">
      <div class="ctrl-label">初始投資 <span id="lbl-principal">350 萬</span></div>
      <input type="range" id="principal" min="0" max="2000" step="1" value="350">
      <input type="number" id="principal-num" min="0" step="1" value="350" placeholder="萬">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label">年利率 <span id="lbl-rate">15.0%</span></div>
      <input type="range" id="rate" min="0.1" max="100" step="0.1" value="15">
      <input type="number" id="rate-num" min="0.1" max="100" step="0.1" value="15" placeholder="%">
    </div>
    <!-- 已修改：每月定投預設2，拉桿範圍 0-10 -->
    <div class="ctrl-row">
      <div class="ctrl-label">每月定投 <span id="lbl-contrib">2 萬/月</span></div>
      <input type="range" id="contrib" min="0" max="10" step="0.1" value="2">
      <input type="number" id="contrib-num" min="0" step="0.1" value="2" placeholder="萬">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label">年數 <span id="lbl-years">5 年</span></div>
      <input type="range" id="years" min="1" max="100" step="1" value="5">
      <input type="number" id="years-num" min="1" step="1" value="5" placeholder="年">
    </div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">總投入</div>
      <div class="metric-value" id="m-invested">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">利息收益</div>
      <div class="metric-value highlight" id="m-interest">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">最終餘額</div>
      <div class="metric-value" id="m-balance">—</div>
    </div>
  </div>

  <div class="chart-wrap">
    <canvas id="chart" role="img" aria-label="折線圖顯示複利隨時間增長，比較總投入與最終餘額"></canvas>
  </div>

  <div class="legend">
    <span><span class="swatch" style="background:#B5D4F4"></span>總投入金額</span>
    <span><span class="swatch" style="background:#185FA5"></span>含利息餘額</span>
  </div>

  <div class="summary" id="summary"></div>

  <script>
    const fmtW = v => (Math.round(v * 10) / 10).toLocaleString() + ' 萬';

    function calcData(principal, rate, years, monthly) {
      const labels = [], balances = [], invested = [];
      const r = rate / 100 / 12;
      for (let y = 0; y <= years; y++) {
        const m = y * 12;
        const bal = r === 0
          ? principal + monthly * m
          : principal * Math.pow(1 + r, m) + monthly * (Math.pow(1 + r, m) - 1) / r;
        labels.push(y === 0 ? '現在' : y + '年');
        balances.push(Math.round(bal * 10) / 10);
        invested.push(Math.round((principal + monthly * m) * 10) / 10);
      }
      return { labels, balances, invested };
    }

    const ctx = document.getElementById('chart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          {
            data: [],
            borderColor: '#B5D4F4',
            backgroundColor: 'rgba(181,212,244,0.25)',
            fill: true, pointRadius: 0, borderWidth: 2, tension: 0.3
          },
          {
            data: [],
            borderColor: '#185FA5',
            backgroundColor: 'rgba(24,95,165,0.12)',
            fill: true, pointRadius: 0, borderWidth: 2.5, tension: 0.3
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: c => ' ' + fmtW(c.raw) } }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: '#888', font: { size: 11 }, maxTicksLimit: 11, autoSkip: true }
          },
          y: {
            grid: { color: 'rgba(128,128,128,0.1)' },
            ticks: { color: '#888', font: { size: 11 }, callback: v => v + ' 萬' }
          }
        }
      }
    });

    function update() {
      const principal = +document.getElementById('principal').value;
      const rate      = +document.getElementById('rate').value;
      const years     = +document.getElementById('years').value;
      const monthly   = +document.getElementById('contrib').value;

      document.getElementById('lbl-principal').textContent = fmtW(principal);
      document.getElementById('lbl-rate').textContent      = (+rate).toFixed(1) + '%';
      document.getElementById('lbl-years').textContent     = years + ' 年';
      document.getElementById('lbl-contrib').textContent   = fmtW(monthly) + '/月';

      const { labels, balances, invested } = calcData(principal, rate, years, monthly);
      document.getElementById('m-invested').textContent = fmtW(invested[invested.length - 1]);
      document.getElementById('m-interest').textContent = fmtW(balances[balances.length - 1] - invested[invested.length - 1]);
      document.getElementById('m-balance').textContent  = fmtW(balances[balances.length - 1]);

      chart.data.labels               = labels;
      chart.data.datasets[0].data   = invested;
      chart.data.datasets[1].data   = balances;
      chart.update('none');

      const finalBal = balances[balances.length - 1];
      const finalInv = invested[invested.length - 1];
      const interest = finalBal - finalInv;
      const multiple = finalInv > 0 ? (finalBal / finalInv).toFixed(1) : '—';
      const ratio = finalInv > 0 ? Math.round((interest / finalInv) * 100) : 0;
      document.getElementById('summary').innerHTML =
        `以 <strong>${fmtW(principal)}</strong> 起始、每月定投 <strong>${fmtW(monthly)}</strong>，` +
        `在年利率 <strong>${(+rate).toFixed(1)}%</strong> 下經過 <strong>${years} 年</strong>，` +
        `總共投入 <strong>${fmtW(finalInv)}</strong>，透過複利累積利息 <strong>${fmtW(interest)}</strong>，` +
        `最終餘額達 <strong>${fmtW(finalBal)}</strong>，相當於總投入的 <strong>${multiple} 倍</strong>，` +
        `利息佔總投入的 <strong>${ratio}%</strong>。`;
    }

    function syncSliderToNum(id) {
      const slider = document.getElementById(id);
      const num = document.getElementById(id + '-num');
      const val = +slider.value;
      num.value = val;
      update();
    }

    function syncNumToSlider(id) {
      const slider = document.getElementById(id);
      const num = document.getElementById(id + '-num');
      let val = parseFloat(num.value);
      if (isNaN(val) || val < +slider.min) return;
      // 若手動輸入超過拉桿最大值，則自動調高拉桿上限，確保邏輯正確
      if (val > +slider.max) slider.max = val;
      slider.value = val;
      update();
    }

    ['principal', 'rate', 'contrib', 'years'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => syncSliderToNum(id));
      document.getElementById(id + '-num').addEventListener('input', () => syncNumToSlider(id));
    });
    update();
  </script>
</body>
</html>
